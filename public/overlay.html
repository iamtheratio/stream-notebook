<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Stream Notebook — Overlay</title>
<style>
  /* OBS browser sources are transparent by default; keep it that way. */
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
</style>
</head>
<body>

<!-- The notebook module renders itself into the page and manages its own DOM,
     styles and visibility. This page only has to keep a socket alive for it. -->
<script src="notebook-overlay.js"></script>

<script>
(function () {
  'use strict';

  const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
  let ws = null;
  let retry = 0;

  // ── Size and position ────────────────────────────────────────────────────
  // Applied as an override on top of the notebook module, never inside it:
  // notebook-overlay.js is shared verbatim with the upstream project.
  //
  // `zoom` rather than `transform: scale` on purpose. The module warns that a
  // transform promotes it to a composited layer, which makes CEF bilinear-sample
  // the emote images and blur the text. `zoom` re-lays-out and rasterizes at the
  // new size, so it stays crisp at any scale.
  // --nbk-exit is the direction the notebook swipes away to. It must match the
  // side it's parked on, or it travels the full width of the screen to leave —
  // a right-hand notebook exiting left crosses everything on the way out.
  const CORNERS = {
    'bottom-left':  'left:26px; right:auto; bottom:76px; top:auto; --nbk-exit:-135%;',
    'bottom-right': 'left:auto; right:26px; bottom:76px; top:auto; --nbk-exit:135%;',
    'top-left':     'left:26px; right:auto; top:26px; bottom:auto; --nbk-exit:-135%;',
    'top-right':    'left:auto; right:26px; top:26px; bottom:auto; --nbk-exit:135%;',
  };

  // ?type=vertical picks the vertical size/corner from the dashboard; anything
  // else uses the normal ones. This page feeds EVERY browser source, so a
  // horizontal and a vertical overlay usually run at the same time and need
  // different answers — the URL says WHICH overlay this is, and the dashboard
  // says what it should look like. No numbers in the URL.
  const IS_VERTICAL = new URLSearchParams(location.search).get('type') === 'vertical';

  function applyLayout(s) {
    s = s || {};
    const rawScale = IS_VERTICAL ? s.verticalScale : s.overlayScale;
    const rawCorner = IS_VERTICAL ? s.verticalCorner : s.overlayCorner;

    const scale = Number(rawScale) > 0 ? Number(rawScale) : (IS_VERTICAL ? 2 : 1);
    const corner = CORNERS[rawCorner] ? rawCorner : (IS_VERTICAL ? 'top-left' : 'bottom-left');

    let el = document.getElementById('nbk-layout');
    if (!el) {
      el = document.createElement('style');
      el.id = 'nbk-layout';
      document.head.appendChild(el);
    }
    el.textContent = '#nbk-stage {' + CORNERS[corner] + 'zoom:' + scale + ';}';
  }

  // Fetched over HTTP rather than pushed, so the overlay lays out correctly the
  // moment OBS loads it — before any WebSocket traffic arrives.
  function loadLayout() {
    fetch('/api/settings')
      .then(r => r.json())
      .then(r => { if (r && r.ok) applyLayout(r.settings); })
      .catch(() => { /* defaults are already correct */ });
  }

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      retry = 0;
      // Subscribes to the notes service and asks for current state, so the
      // notebook paints correctly the instant OBS loads or refreshes the source.
      window.NotesOverlay.attach(ws);
    };

    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch (_) { return; }
      // Sent when the dashboard saves, so size/position change live in OBS
      // instead of needing the browser source refreshed.
      if (msg.event === 'notebook:layout') { applyLayout(msg.data); return; }
      if (msg.event && msg.event.indexOf('note:') === 0) {
        window.NotesOverlay.handle(msg.event, msg.data);
      }
    };

    // Backoff on reconnect so a server restart doesn't hammer the socket, but
    // stay quick early — a browser-source refresh should feel instant.
    ws.onclose = () => {
      const delay = Math.min(10000, 500 * Math.pow(2, retry++));
      setTimeout(connect, delay);
    };

    ws.onerror = () => { try { ws.close(); } catch (_) {} };
  }

  loadLayout();
  connect();
})();
</script>

</body>
</html>
